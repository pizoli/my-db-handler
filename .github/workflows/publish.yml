name: Publish Python Package

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"
      - name: Build package
        run: poetry build

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.GH_PACKAGES_TOKEN }}
          TWINE_REPOSITORY_URL: https://pypi.pkg.github.com/pizoli/my-db-handler
        run: |
          pip install twine
          twine upload --repository-url $TWINE_REPOSITORY_URL dist/* --verbose
